<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon-box">
        <div class="chef-icon"></div>
      </div>
      <div class="title-area">
        <h3>KuvAI pomocnik</h3>
        <p>Dodaj mi novi recept</p>
      </div>
    </div>

    <div>
      <button id="scrapeBtn" class="action-btn">
        <svg id="icon-send" class="btn-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
        
        <div id="icon-spinner" class="spinner"></div>

        <svg id="icon-success" class="btn-icon hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>

        <span id="btnText">Posalji</span>
      </button>

      <div class="status-container">
        <div id="statusText" class="status-text"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
