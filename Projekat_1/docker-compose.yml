
services:
  app:
    build: . 
    container_name: my_python_app 
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - app-network 
  redis:
    image: redis/redis-stack-server:latest 
    container_name: my_redis_stack 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data 
    networks:
      - app-network 
networks:
  app-network:
    driver: bridge 

volumes:
  redis_data:
